<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Camelleon Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  border-bottom: 1px solid #222;
}

.test {
  text-align: center;
  color: #00ff88;
  font-size: 20px;
  margin-top: 20px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #151515;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: #00ff88;
  margin: 10px 0;
}

button {
  background: #00ff88;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- 🔥 TEST (ovo mora da se vidi) -->
<div class="test">TEST SAJT RADI ✔</div>

<header>CAMELLEON SHOP</header>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <h3>Air Max 95</h3>
    <div class="price">120€</div>
    <button>Dodaj</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <h3>Jordan 4</h3>
    <div class="price">150€</div>
    <button>Dodaj</button>
  </div>

</div>

</body>
</html>
